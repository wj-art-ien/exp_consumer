<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Experiment Redirect</title>
    <script>
        // 1. 접속자가 카톡 등 미리보기 봇인지 확인하는 정규식
        const isBot = /bot|kakaotalk-scrap|facebookexternalhit|twitterbot|slackbot|line/i.test(navigator.userAgent);

        // 2. 봇이 아닌 '실제 사람'일 때만 즉시 실행
        if (!isBot) {
            const rand = Math.random();
            if (rand < 0.5) {
                window.location.replace("https://forms.gle/cBZzBe2JQpbo1WxJ8"); // Version 1
            } else {
                window.location.replace("https://forms.gle/gSb4T6HBn7bBgLyj9"); // Version 2
            }
        }
    </script>
</head>
<body>
    <p>Redirecting...</p>
</body>
</html>
